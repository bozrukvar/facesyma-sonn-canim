# upstream blocks kept for reference; proxy_pass uses resolver variables for dynamic DNS
upstream django    { server backend:8000;  keepalive 16; }
upstream ai_chat   { server ai_chat:8002;  keepalive 8;  }
upstream coach     { server coach:8003;    keepalive 8;  }
upstream test_svc  { server test:8004;     keepalive 4;  }

# Gzip compression
gzip on;
gzip_vary on;
gzip_comp_level 5;
gzip_types application/json text/plain application/javascript text/css text/xml application/xml;
gzip_min_length 1024;
gzip_proxied any;

# Hide nginx version from Server header
server_tokens off;

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=20r/m;

server {
    listen 80;
    server_name localhost;

    # Docker internal DNS — re-resolve container IPs after every restart
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' wss: ws:; frame-ancestors 'none';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Upload size limit (analysis endpoint accepts images up to 15 MB)
    client_max_body_size 15M;

    # # Face Validation API (must come before generic /api/) — temporarily disabled
    # location /api/v1/face/ {
    #     proxy_pass http://face_validation/api/v1/face/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_connect_timeout 10s;
    #     proxy_send_timeout 30s;
    #     proxy_read_timeout 30s;
    # }

    # WebSocket — admin live dashboard + gamification leaderboard
    location /ws/ {
        set $django_upstream http://backend:8000;
        proxy_pass $django_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Admin HTML Panel — strict rate limit
    location /admin/ {
        limit_req zone=admin_limit burst=10 nodelay;
        limit_req_status 429;
        set $django_upstream http://backend:8000;
        proxy_pass $django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Admin API endpoints — must come before generic /api/ block
    location /api/v1/admin/ {
        limit_req zone=admin_limit burst=10 nodelay;
        limit_req_status 429;
        set $django_upstream http://backend:8000;
        proxy_pass $django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Auth endpoints — strict rate limiting (10 req/min per IP)
    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;
        set $django_upstream http://backend:8000;
        proxy_pass $django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Django REST API
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
        set $django_upstream http://backend:8000;
        proxy_pass $django_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # AI Chat API — /chat/start, /chat/message, etc.
    location /chat/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
        set $ai_chat_upstream http://ai_chat:8002;
        proxy_pass $ai_chat_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 15s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }

    # Coach API
    location /coach/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
        set $coach_upstream http://coach:8003;
        proxy_pass $coach_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Test Module API
    location /test/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
        set $test_upstream http://test:8004;
        proxy_pass $test_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoints
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
