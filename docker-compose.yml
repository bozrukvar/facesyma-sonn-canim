version: '3.9'

# Network for service communication
networks:
  facesyma_network:
    driver: bridge

services:
  # Django Backend API (:8000) — only reachable via nginx inside the Docker network
  backend:
    build: ./facesyma_backend
    container_name: facesyma_backend
    env_file: ./facesyma_backend/.env
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379/1
    networks:
      - facesyma_network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Redis Cache — internal only, no host port exposure
  redis:
    image: redis:7-alpine
    container_name: facesyma_redis
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    networks:
      - facesyma_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3

  # AI Chat Service — internal only, routed via nginx /v1/chat/
  ai_chat:
    build: ./facesyma_ai
    container_name: facesyma_ai_chat
    env_file: ./facesyma_ai/.env
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379/0
    networks:
      - facesyma_network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Coach API Service — internal only, routed via nginx /coach/
  coach:
    build: ./facesyma_coach
    container_name: facesyma_coach
    env_file: ./facesyma_coach/.env
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379/2
    networks:
      - facesyma_network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Test Module Service — internal only, routed via nginx /test/
  test:
    build: ./facesyma_test
    container_name: facesyma_test
    env_file: ./facesyma_test/.env
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - facesyma_network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/test/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # # Face Validation Microservice (:8005) — Temporarily disabled (build issue)
  # face_validation:
  #   build: ./facesyma_face_validation
  #   container_name: facesyma_face_validation
  #   ports:
  #     - "8005:8005"
  #   environment:
  #     - PYTHONUNBUFFERED=1
  #   networks:
  #     - facesyma_network
  #   depends_on:
  #     redis:
  #       condition: service_healthy
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health').read()"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 15s

  # Nginx Reverse Proxy (:80)
  nginx:
    image: nginx:alpine
    container_name: facesyma_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - facesyma_network
    depends_on:
      - backend
      - ai_chat
      - coach
      - test
      # - face_validation (temporarily disabled)
      - redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
