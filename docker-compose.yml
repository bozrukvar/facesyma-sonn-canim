version: '3.9'

# Network for service communication
networks:
  facesyma_network:
    driver: bridge

services:
  # Django Backend API (:8000)
  backend:
    build: ./facesyma_backend
    container_name: facesyma_backend
    env_file: ./facesyma_backend/.env
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379/1
    networks:
      - facesyma_network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/admin/auth/login/').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Redis Cache (:6379)
  redis:
    image: redis:7-alpine
    container_name: facesyma_redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    networks:
      - facesyma_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3

  # AI Chat Service (:8002)
  ai_chat:
    build: ./facesyma_ai
    container_name: facesyma_ai_chat
    env_file: ./facesyma_ai/.env
    ports:
      - "8002:8002"
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379/0
    networks:
      - facesyma_network
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Coach API Service (:8003)
  coach:
    build: ./facesyma_coach
    container_name: facesyma_coach
    env_file: ./facesyma_coach/.env
    ports:
      - "8003:8003"
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379/2
    networks:
      - facesyma_network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Test Module Service (:8004)
  test:
    build: ./facesyma_test
    container_name: facesyma_test
    env_file: ./facesyma_test/.env
    ports:
      - "8004:8004"
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - facesyma_network
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/test/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Face Validation Microservice (:8005)
  face_validation:
    build: ./facesyma_face_validation
    container_name: facesyma_face_validation
    ports:
      - "8005:8005"
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - facesyma_network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Ollama LLM Service (:11434)
  ollama:
    image: ollama/ollama:latest
    container_name: facesyma_ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - facesyma_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Nginx Reverse Proxy (:80)
  nginx:
    image: nginx:alpine
    container_name: facesyma_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - facesyma_network
    depends_on:
      - backend
      - ai_chat
      - coach
      - test
      - face_validation
      - redis
      - ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  ollama_data:
    driver: local
