name: Deploy Facesyma to Production

on:
  push:
    branches:
      - main
      - production

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./facesyma_backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/facesyma-backend:latest

      - name: Build and push AI Chat
        uses: docker/build-push-action@v4
        with:
          context: ./facesyma_ai
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/facesyma-ai:latest

      - name: Build and push Coach
        uses: docker/build-push-action@v4
        with:
          context: ./facesyma_coach
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/facesyma-coach:latest

      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/facesyma/facesyma-sonn-canim
            git pull origin main
            docker-compose pull
            docker-compose up -d
            docker-compose logs -f

      - name: Health check
        run: |
          sleep 10
          curl -f http://${{ secrets.SERVER_HOST }}/api/v1/admin/users/stats/ || exit 1
          curl -f http://${{ secrets.SERVER_HOST }}/v1/chat/analyze || exit 1
          curl -f http://${{ secrets.SERVER_HOST }}/coach/modules || exit 1
