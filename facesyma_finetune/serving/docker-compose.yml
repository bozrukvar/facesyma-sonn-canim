version: "3.9"

services:

  # vLLM — model sunucusu (GPU gerektirir)
  vllm:
    image: vllm/vllm-openai:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ./models:/models          # Fine-tuned model buraya
    command: >
      --model /models/facesyma-gpt2-lora
      --host  0.0.0.0
      --port  8001
      --dtype float16
      --max-model-len 128
      --tensor-parallel-size 1
      --gpu-memory-utilization 0.85
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # FastAPI — Facesyma AI servis katmanı
  facesyma-ai:
    build:
      context: ./serving
      dockerfile: Dockerfile
    environment:
      - VLLM_URL=http://vllm:8001
      - MODEL_ID=facesyma-llama3.1-8b
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - MAX_TOKENS=1024
      - TEMPERATURE=0.7
    ports:
      - "8002:8002"
    depends_on:
      vllm:
        condition: service_healthy
    restart: unless-stopped

  # Nginx — reverse proxy (opsiyonel, SSL için)
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - facesyma-ai
    restart: unless-stopped
    profiles: ["production"]   # sadece production'da başlat

networks:
  default:
    driver: bridge
